<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitBear · AI 경영관리 플랫폼</title>
    <meta name="description" content="소규모 기업 특화 AI 경영관리 플랫폼 — 회계·세무·인사·프로젝트 자동화" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background: #0d1117;
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* Custom scrollbar — thin, dark, purple-tinted */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(13, 17, 23, 0.6);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(139, 92, 246, 0.35);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(139, 92, 246, 0.6);
      }
      ::-webkit-scrollbar-corner {
        background: transparent;
      }

      /* Firefox scrollbar */
      html {
        scrollbar-width: thin;
        scrollbar-color: rgba(139, 92, 246, 0.35) transparent;
      }

      /* Input / textarea focus glow — purple */
      input:focus,
      textarea:focus,
      select:focus {
        outline: none !important;
        border-color: rgba(139, 92, 246, 0.6) !important;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.18) !important;
        transition: border-color 0.18s, box-shadow 0.18s;
      }

      /* Text selection — purple tint */
      ::selection {
        background: rgba(139, 92, 246, 0.4);
        color: #f5f3ff;
      }
      ::-moz-selection {
        background: rgba(139, 92, 246, 0.4);
        color: #f5f3ff;
      }

      /* Button hover transitions */
      button {
        transition: background 0.15s, border-color 0.15s, color 0.15s,
          box-shadow 0.15s, opacity 0.15s, transform 0.1s;
      }
      button:active {
        transform: scale(0.97);
      }

      /* Smooth transitions for interactive elements */
      a, input, textarea, select {
        transition: color 0.15s, background 0.15s, border-color 0.15s, box-shadow 0.15s;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
